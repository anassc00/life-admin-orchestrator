<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi perfil — Life Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #e0e0f0; display: flex;
    }
    .sidebar { width: 220px; min-height: 100vh; flex-shrink: 0; background: rgba(15,12,41,0.7); backdrop-filter: blur(12px); border-right: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; padding: 1.5rem 0; position: sticky; top: 0; height: 100vh; }
    .sidebar-logo { font-weight: 700; font-size: 0.95rem; color: #7c6ff7; padding: 0 1.5rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .sidebar-nav { flex: 1; padding: 1rem 0; }
    .nav-item { display: flex; align-items: center; gap: 0.65rem; padding: 0.7rem 1.5rem; color: #9090b0; font-size: 0.9rem; font-weight: 500; text-decoration: none; transition: color 0.15s, background 0.15s; border-left: 2px solid transparent; }
    .nav-item:hover { color: #e0e0f0; background: rgba(255,255,255,0.04); }
    .nav-item.active { color: #c0b8ff; border-left-color: #7c6ff7; background: rgba(124,111,247,0.08); }
    .nav-icon { font-size: 1rem; width: 1.25rem; text-align: center; }
    .sidebar-footer { padding: 1rem 1.5rem; }
    .btn-logout { width: 100%; background: transparent; border: 1px solid rgba(255,255,255,0.12); color: #9090b0; font-size: 0.82rem; font-weight: 600; padding: 0.5rem; border-radius: 0.5rem; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
    .btn-logout:hover { color: #f87171; border-color: #f8717155; }

    .main { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 3rem 2rem; }
    .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.25rem; padding: 2.25rem; width: 100%; max-width: 440px; backdrop-filter: blur(12px); }
    .page-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #7c6ff7; margin-bottom: 0.3rem; }
    h2 { font-size: 1.3rem; font-weight: 700; color: #fff; margin-bottom: 1.75rem; }
    .avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, #7c6ff7, #302b63);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 700; color: #fff;
      margin-bottom: 1.5rem;
    }
    .field-row { margin-bottom: 1.25rem; }
    .field-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #6060a0; margin-bottom: 0.3rem; }
    .field-value { font-size: 1rem; color: #e0e0f0; font-weight: 500; min-height: 1.4rem; }
    .field-value.loading { background: linear-gradient(90deg,rgba(255,255,255,0.06) 25%,rgba(255,255,255,0.12) 50%,rgba(255,255,255,0.06) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 0.35rem; height: 1.2rem; width: 160px; }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .divider { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 1.25rem 0; }
    .role-badge { display: inline-block; background: rgba(124,111,247,0.15); border: 1px solid rgba(124,111,247,0.3); color: #a89cff; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 0.25rem 0.65rem; border-radius: 0.4rem; }
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-logo">Life Admin</div>
    <div class="sidebar-nav">
      <a href="/dashboard/" class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a>
      <a href="/finance/accounts/" class="nav-item"><span class="nav-icon">💳</span> Mis cuentas</a>
      <a href="/profile/" class="nav-item active"><span class="nav-icon">👤</span> Mi perfil</a>
    </div>
    <div class="sidebar-footer">
      <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
    </div>
  </nav>

  <main class="main">
    <div class="card">
      <div class="page-title">Cuenta</div>
      <h2>Mi perfil</h2>

      <div class="avatar" id="avatar">?</div>

      <div class="field-row">
        <div class="field-label">Nombre completo</div>
        <div class="field-value loading" id="full-name"></div>
      </div>

      <div class="field-row">
        <div class="field-label">Correo electrónico</div>
        <div class="field-value loading" id="email"></div>
      </div>

      <hr class="divider" />

      <div class="field-row">
        <div class="field-label">Rol</div>
        <div class="field-value"><span class="role-badge" id="role"></span></div>
      </div>
    </div>
  </main>

  <script>
    async function loadProfile() {
      try {
        const res = await fetch('/api/auth/me');
        const data = await res.json();
        if (!res.ok) { window.location.href = '/login/'; return; }

        const nameEl = document.getElementById('full-name');
        const emailEl = document.getElementById('email');
        const avatarEl = document.getElementById('avatar');
        const roleEl = document.getElementById('role');

        nameEl.textContent = data.full_name;
        nameEl.classList.remove('loading');
        emailEl.textContent = data.email;
        emailEl.classList.remove('loading');
        avatarEl.textContent = data.full_name.charAt(0).toUpperCase();
        roleEl.textContent = data.is_admin ? 'Administrador' : 'Usuario';
        document.title = `${data.full_name} — Life Admin`;
      } catch { window.location.href = '/login/'; }
    }

    document.getElementById('btn-logout').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/';
    });

    loadProfile();
  </script>
</body>
</html>
