<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ahorros — Life Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: #e0e0f0; display: flex; }
    .sidebar { width: 220px; min-height: 100vh; flex-shrink: 0; background: rgba(15,12,41,0.7); backdrop-filter: blur(12px); border-right: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; padding: 1.5rem 0; position: sticky; top: 0; height: 100vh; }
    .sidebar-logo { font-weight: 700; font-size: 0.95rem; color: #7c6ff7; padding: 0 1.5rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .sidebar-nav { flex: 1; padding: 1rem 0; }
    .nav-item { display: flex; align-items: center; gap: 0.65rem; padding: 0.7rem 1.5rem; color: #9090b0; font-size: 0.9rem; font-weight: 500; text-decoration: none; transition: color 0.15s, background 0.15s; border-left: 2px solid transparent; }
    .nav-item:hover { color: #e0e0f0; background: rgba(255,255,255,0.04); }
    .nav-item.active { color: #c0b8ff; border-left-color: #7c6ff7; background: rgba(124,111,247,0.08); }
    .nav-icon { font-size: 1rem; width: 1.25rem; text-align: center; }
    .sidebar-footer { padding: 1rem 1.5rem; }
    .btn-logout { width: 100%; background: transparent; border: 1px solid rgba(255,255,255,0.12); color: #9090b0; font-size: 0.82rem; font-weight: 600; padding: 0.5rem; border-radius: 0.5rem; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
    .btn-logout:hover { color: #f87171; border-color: #f8717155; }

    .main { flex: 1; display: flex; flex-direction: column; padding: 2.5rem 2rem; gap: 1.75rem; min-width: 0; }
    .page-title-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #7c6ff7; margin-bottom: 0.3rem; }
    h1 { font-size: 1.4rem; font-weight: 700; color: #fff; }

    /* Grid */
    .content-grid { display: grid; grid-template-columns: 1fr 380px; gap: 1.5rem; align-items: start; }
    @media (max-width: 900px) { .content-grid { grid-template-columns: 1fr; } }

    /* Goals list */
    .goals-list { display: flex; flex-direction: column; gap: 1rem; }
    .goal-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09); border-radius: 1rem; padding: 1.25rem 1.5rem; }
    .goal-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; margin-bottom: 0.8rem; }
    .goal-motive { font-size: 1rem; font-weight: 700; color: #fff; }
    .goal-target { font-size: 0.8rem; color: #7c6ff7; font-weight: 600; }
    .goal-progress-bar { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; margin-bottom: 0.5rem; }
    .goal-progress-fill { height: 100%; background: linear-gradient(90deg, #7c6ff7, #34d399); border-radius: 3px; transition: width 0.5s ease; }
    .goal-meta { display: flex; justify-content: space-between; font-size: 0.75rem; color: #6060a0; }
    .goal-deposited { color: #34d399; font-weight: 600; }
    .btn-deposit { font-size: 0.78rem; font-weight: 700; background: rgba(124,111,247,0.15); border: 1px solid rgba(124,111,247,0.35); color: #c0b8ff; padding: 0.35rem 0.8rem; border-radius: 0.45rem; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
    .btn-deposit:hover { background: rgba(124,111,247,0.3); }
    .completed-badge { font-size: 0.7rem; font-weight: 700; background: rgba(52,211,153,0.12); color: #34d399; border: 1px solid rgba(52,211,153,0.25); padding: 0.2rem 0.55rem; border-radius: 0.9rem; }
    .empty-goals { color: #6060a0; font-size: 0.88rem; padding: 2rem 0; text-align: center; }

    /* Form card */
    .form-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.25rem; padding: 1.75rem; backdrop-filter: blur(12px); }
    .section-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #7c6ff7; margin-bottom: 0.65rem; padding-bottom: 0.3rem; border-bottom: 1px solid rgba(124,111,247,0.2); }
    label { display: block; font-size: 0.78rem; font-weight: 600; color: #9090b0; margin-bottom: 0.35rem; }
    input, select { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: #e0e0f0; border-radius: 0.55rem; padding: 0.6rem 0.85rem; font-size: 0.92rem; margin-bottom: 1rem; outline: none; transition: border-color 0.2s; font-family: inherit; }
    input:focus, select:focus { border-color: #7c6ff7; }
    input:disabled { opacity: 0.5; cursor: not-allowed; }
    select option { background: #1e1b4b; }
    .btn-submit { width: 100%; background: #7c6ff7; border: none; color: #fff; font-size: 0.95rem; font-weight: 700; padding: 0.7rem; border-radius: 0.7rem; cursor: pointer; transition: background 0.2s; margin-top: 0.25rem; }
    .btn-submit:hover { background: #6a5fe5; }
    .btn-submit:disabled { background: rgba(124,111,247,0.4); cursor: not-allowed; }
    .error-msg { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: #f87171; padding: 0.65rem 0.9rem; border-radius: 0.55rem; font-size: 0.83rem; margin-bottom: 1rem; display: none; }
    .tab-row { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; }
    .tab-btn { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); color: #9090b0; font-size: 0.82rem; font-weight: 700; padding: 0.5rem; border-radius: 0.55rem; cursor: pointer; transition: all 0.15s; }
    .tab-btn.active { background: rgba(124,111,247,0.2); border-color: rgba(124,111,247,0.5); color: #c0b8ff; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    .account-hint { font-size: 0.74rem; color: #6060a0; margin-top: -0.75rem; margin-bottom: 0.85rem; min-height: 1em; }
    .currency-note { font-size: 0.74rem; color: #fbbf24; background: rgba(251,191,36,0.07); border: 1px solid rgba(251,191,36,0.2); border-radius: 0.45rem; padding: 0.5rem 0.7rem; margin-bottom: 1rem; }

    /* Toast */
    #toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: rgba(52,211,153,0.15); border: 1px solid rgba(52,211,153,0.35); color: #34d399; padding: 0.7rem 1.1rem; border-radius: 0.6rem; font-size: 0.83rem; font-weight: 600; opacity: 0; transform: translateY(8px); transition: opacity 0.25s, transform 0.25s; pointer-events: none; z-index: 999; }
    #toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-logo">Life Admin</div>
    <div class="sidebar-nav">
      <a href="/dashboard/" class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a>
      <a href="/finance/accounts/" class="nav-item"><span class="nav-icon">💳</span> Mis cuentas</a>
      <a href="/finance/income/" class="nav-item"><span class="nav-icon">💰</span> Ingresos</a>
      <a href="/finance/expenses/" class="nav-item"><span class="nav-icon">💸</span> Egresos</a>
      <a href="/finance/savings/" class="nav-item active"><span class="nav-icon">🏦</span> Ahorros</a>
      <a href="/finance/planning/" class="nav-item"><span class="nav-icon">📊</span> Planificación</a>
      <a href="/finance/transactions/" class="nav-item"><span class="nav-icon">📋</span> Transacciones</a>
      <a href="/profile/" class="nav-item"><span class="nav-icon">👤</span> Mi perfil</a>
    </div>
    <div class="sidebar-footer">
      <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
    </div>
  </nav>

  <main class="main">
    <div>
      <div class="page-title-label">Finanzas</div>
      <h1>Metas de ahorro</h1>
    </div>

    <div class="content-grid">
      <!-- Goals list -->
      <div>
        <div id="goals-list" class="goals-list">
          <div class="empty-goals" id="goals-loading">Cargando metas...</div>
        </div>
      </div>

      <!-- Side panel: create goal / deposit -->
      <div class="form-card">
        <div class="tab-row">
          <button class="tab-btn active" data-tab="tab-new">Nueva meta</button>
          <button class="tab-btn" data-tab="tab-deposit">Aportar</button>
        </div>

        <!-- Tab: New goal -->
        <div class="tab-pane active" id="tab-new">
          <div class="section-label">Crear meta de ahorro</div>
          <div class="error-msg" id="new-error"></div>
          <label for="motive">Motivo</label>
          <input id="motive" type="text" placeholder="Ej: Fondo de emergencia" required />
          <label for="target">Monto objetivo (USD)</label>
          <input id="target" type="number" step="0.01" min="1" placeholder="0.00" required />
          <button class="btn-submit" id="btn-new">Crear meta</button>
        </div>

        <!-- Tab: Deposit -->
        <div class="tab-pane" id="tab-deposit">
          <div class="section-label">Registrar aporte</div>
          <div class="currency-note">Solo se permiten cuentas en USD o USDT.</div>
          <div class="error-msg" id="dep-error"></div>
          <label for="dep-goal">Meta destino</label>
          <select id="dep-goal" required>
            <option value="">Seleccionar meta...</option>
          </select>
          <label for="dep-account">Cuenta (USD / USDT)</label>
          <select id="dep-account" required>
            <option value="">Seleccionar cuenta...</option>
          </select>
          <div class="account-hint" id="dep-account-hint"></div>
          <label for="dep-amount">Monto</label>
          <input id="dep-amount" type="number" step="0.000001" min="0.000001" placeholder="0.00" required />
          <label for="dep-currency">Moneda de la cuenta</label>
          <input id="dep-currency" type="text" disabled placeholder="Se detecta automáticamente" />
          <input id="dep-currency-hidden" type="hidden" />
          <label for="dep-date">Fecha</label>
          <input id="dep-date" type="date" required />
          <button class="btn-submit" id="btn-deposit">Registrar aporte</button>
        </div>
      </div>
    </div>
  </main>

  <div id="toast">Meta actualizada</div>

  <script>
    const USD_CURRENCIES = ['USD', 'USDT'];
    let allGoals = [];
    let allAccounts = [];
    let goalDeposits = {};  // goal_id → deposited amount (placeholder)

    document.getElementById('dep-date').value = new Date().toISOString().split('T')[0];

    // ── Tabs ─────────────────────────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });

    // ── Load data ─────────────────────────────────────────────────────────────
    async function loadAll() {
      const [goalsRes, accountsRes] = await Promise.all([
        fetch('/api/finance/savings/goals'),
        fetch('/api/finance/accounts'),
      ]);
      if (goalsRes.status === 401 || accountsRes.status === 401) {
        window.location.href = '/login/'; return;
      }
      allGoals = await goalsRes.json();
      allAccounts = await accountsRes.json();
      renderGoals();
      populateGoalSelect();
      populateAccountSelect();
    }

    function renderGoals() {
      const container = document.getElementById('goals-list');
      if (!allGoals.length) {
        container.innerHTML = '<div class="empty-goals">Sin metas creadas aún. Crea tu primera meta →</div>';
        return;
      }
      container.innerHTML = allGoals.map(g => {
        const pct = Math.min(100, ((g.deposited_usd || 0) / g.target_amount_usd) * 100).toFixed(1);
        return `
        <div class="goal-card">
          <div class="goal-header">
            <div class="goal-motive">${escHtml(g.motive)}</div>
            ${g.is_completed
              ? '<span class="completed-badge">✓ Completada</span>'
              : `<button class="btn-deposit" onclick="switchToDeposit('${g.goal_id}')">Aportar →</button>`}
          </div>
          <div class="goal-progress-bar">
            <div class="goal-progress-fill" style="width:${pct}%"></div>
          </div>
          <div class="goal-meta">
            <span class="goal-deposited">$${Number(g.deposited_usd || 0).toFixed(2)} ahorrados</span>
            <span>Meta: <strong style="color:#c0b8ff">$${Number(g.target_amount_usd).toFixed(2)}</strong></span>
          </div>
        </div>`;
      }).join('');
    }

    function switchToDeposit(goalId) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      document.querySelector('[data-tab="tab-deposit"]').classList.add('active');
      document.getElementById('tab-deposit').classList.add('active');
      document.getElementById('dep-goal').value = goalId;
    }

    function populateGoalSelect() {
      const sel = document.getElementById('dep-goal');
      const current = sel.value;
      sel.innerHTML = '<option value="">Seleccionar meta...</option>';
      allGoals.filter(g => !g.is_completed).forEach(g => {
        const opt = document.createElement('option');
        opt.value = g.goal_id;
        opt.textContent = g.motive;
        sel.appendChild(opt);
      });
      if (current) sel.value = current;
    }

    function populateAccountSelect() {
      const sel = document.getElementById('dep-account');
      sel.innerHTML = '<option value="">Seleccionar cuenta...</option>';
      const usdAccounts = allAccounts.filter(a =>
        a.default_currencies.some(c => USD_CURRENCIES.includes(c))
      );
      usdAccounts.forEach(a => {
        const opt = document.createElement('option');
        opt.value = a.account_id;
        opt.textContent = `${a.name} (${a.default_currencies.filter(c => USD_CURRENCIES.includes(c)).join('/')})`;
        opt.dataset.currency = a.default_currencies.find(c => USD_CURRENCIES.includes(c)) || 'USD';
        sel.appendChild(opt);
      });
      if (!usdAccounts.length) {
        document.getElementById('dep-account-hint').textContent = 'Sin cuentas USD/USDT. Configúralas en Mis cuentas.';
      }
    }

    document.getElementById('dep-account').addEventListener('change', function () {
      const opt = this.options[this.selectedIndex];
      const currency = opt.dataset?.currency || '';
      document.getElementById('dep-currency').value = currency;
      document.getElementById('dep-currency-hidden').value = currency;
      document.getElementById('dep-account-hint').textContent = currency ? `Cuenta en ${currency}` : '';
    });

    // ── Create goal ───────────────────────────────────────────────────────────
    document.getElementById('btn-new').addEventListener('click', async () => {
      const motive = document.getElementById('motive').value.trim();
      const target = parseFloat(document.getElementById('target').value);
      const errEl = document.getElementById('new-error');
      errEl.style.display = 'none';
      if (!motive || !(target > 0)) { errEl.textContent = 'Completa todos los campos.'; errEl.style.display = 'block'; return; }

      const btn = document.getElementById('btn-new');
      btn.disabled = true; btn.textContent = 'Creando...';
      try {
        const res = await fetch('/api/finance/savings/goals', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
          body: JSON.stringify({ motive, target_amount_usd: target }),
        });
        const data = await res.json();
        if (res.ok) {
          document.getElementById('motive').value = '';
          document.getElementById('target').value = '';
          await loadAll();
          showToast('Meta creada correctamente');
        } else {
          errEl.textContent = data.detail || 'Error al crear la meta.';
          errEl.style.display = 'block';
        }
      } catch { errEl.textContent = 'Error de conexión.'; errEl.style.display = 'block'; }
      btn.disabled = false; btn.textContent = 'Crear meta';
    });

    // ── Deposit ───────────────────────────────────────────────────────────────
    document.getElementById('btn-deposit').addEventListener('click', async () => {
      const goalId   = document.getElementById('dep-goal').value;
      const accountId = document.getElementById('dep-account').value;
      const amount   = parseFloat(document.getElementById('dep-amount').value);
      const currency = document.getElementById('dep-currency-hidden').value;
      const depDate  = document.getElementById('dep-date').value;
      const errEl    = document.getElementById('dep-error');
      errEl.style.display = 'none';

      if (!goalId || !accountId || !(amount > 0) || !currency || !depDate) {
        errEl.textContent = 'Completa todos los campos.'; errEl.style.display = 'block'; return;
      }

      const btn = document.getElementById('btn-deposit');
      btn.disabled = true; btn.textContent = 'Registrando...';
      try {
        const res = await fetch('/api/finance/savings/deposits', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
          body: JSON.stringify({ goal_id: goalId, account_id: accountId, amount, currency, date: depDate }),
        });
        const data = await res.json();
        if (res.ok) {
          document.getElementById('dep-amount').value = '';
          await loadAll();
          showToast('Aporte registrado');
        } else {
          errEl.textContent = data.detail || 'Error al registrar el aporte.';
          errEl.style.display = 'block';
        }
      } catch { errEl.textContent = 'Error de conexión.'; errEl.style.display = 'block'; }
      btn.disabled = false; btn.textContent = 'Registrar aporte';
    });

    // ── Helpers ───────────────────────────────────────────────────────────────
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function getCookie(name) {
      return document.cookie.split('; ').find(r => r.startsWith(name + '='))?.split('=')[1] || '';
    }

    document.getElementById('btn-logout').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/';
    });

    loadAll();
  </script>
</body>
</html>
