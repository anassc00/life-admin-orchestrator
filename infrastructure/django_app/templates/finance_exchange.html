<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cambio de divisas — Life Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #e0e0f0; display: flex;
    }
    .sidebar { width: 220px; min-height: 100vh; flex-shrink: 0; background: rgba(15,12,41,0.7); backdrop-filter: blur(12px); border-right: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; padding: 1.5rem 0; position: sticky; top: 0; height: 100vh; }
    .sidebar-logo { font-weight: 700; font-size: 0.95rem; color: #7c6ff7; padding: 0 1.5rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .sidebar-nav { flex: 1; padding: 1rem 0; }
    .nav-item { display: flex; align-items: center; gap: 0.65rem; padding: 0.7rem 1.5rem; color: #9090b0; font-size: 0.9rem; font-weight: 500; text-decoration: none; transition: color 0.15s, background 0.15s; border-left: 2px solid transparent; }
    .nav-item:hover { color: #e0e0f0; background: rgba(255,255,255,0.04); }
    .nav-item.active { color: #c0b8ff; border-left-color: #7c6ff7; background: rgba(124,111,247,0.08); }
    .nav-icon { font-size: 1rem; width: 1.25rem; text-align: center; }
    .sidebar-footer { padding: 1rem 1.5rem; }
    .btn-logout { width: 100%; background: transparent; border: 1px solid rgba(255,255,255,0.12); color: #9090b0; font-size: 0.82rem; font-weight: 600; padding: 0.5rem; border-radius: 0.5rem; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
    .btn-logout:hover { color: #f87171; border-color: #f8717155; }

    .main { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 3rem 2rem; }
    .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.25rem; padding: 2.25rem; width: 100%; max-width: 460px; backdrop-filter: blur(12px); }
    .page-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #7c6ff7; margin-bottom: 0.3rem; }
    h2 { font-size: 1.3rem; font-weight: 700; color: #fff; margin-bottom: 1.5rem; }
    .section-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #7c6ff7; margin-bottom: 0.65rem; padding-bottom: 0.35rem; border-bottom: 1px solid rgba(124,111,247,0.2); }
    label { display: block; font-size: 0.78rem; font-weight: 600; color: #9090b0; margin-bottom: 0.35rem; }
    input, select, textarea { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: #e0e0f0; border-radius: 0.55rem; padding: 0.6rem 0.85rem; font-size: 0.92rem; margin-bottom: 1rem; outline: none; transition: border-color 0.2s; font-family: inherit; }
    input:focus, select:focus, textarea:focus { border-color: #7c6ff7; }
    select option { background: #1e1b4b; }
    textarea { resize: vertical; min-height: 70px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem; }
    .arrow-divider { text-align: center; font-size: 1.1rem; color: #7c6ff7; margin: -0.1rem 0 0.85rem; }
    .btn-submit { width: 100%; background: #7c6ff7; border: none; color: #fff; font-size: 0.95rem; font-weight: 700; padding: 0.7rem; border-radius: 0.7rem; cursor: pointer; transition: background 0.2s; margin-top: 0.25rem; }
    .btn-submit:hover { background: #6a5fe5; }
    .btn-submit:disabled { background: rgba(124,111,247,0.4); cursor: not-allowed; }
    #error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: #f87171; padding: 0.65rem 0.9rem; border-radius: 0.55rem; font-size: 0.83rem; margin-bottom: 1rem; display: none; }
    .no-accounts-note { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.25); color: #fbbf24; padding: 0.65rem 0.9rem; border-radius: 0.55rem; font-size: 0.83rem; margin-bottom: 1rem; display: none; }
    .no-accounts-note a { color: #fbbf24; }
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-logo">Life Admin</div>
    <div class="sidebar-nav">
      <a href="/dashboard/" class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a>
      <a href="/finance/accounts/" class="nav-item active"><span class="nav-icon">💳</span> Mis cuentas</a>
      <a href="/profile/" class="nav-item"><span class="nav-icon">👤</span> Mi perfil</a>
    </div>
    <div class="sidebar-footer">
      <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
    </div>
  </nav>

  <main class="main">
    <div class="card">
      <div class="page-title">Finanzas</div>
      <h2>Cambio de divisas</h2>

      <div id="no-accounts-note" class="no-accounts-note">
        Necesitas al menos 2 cuentas para registrar un cambio. <a href="/finance/accounts/">Créalas aquí →</a>
      </div>
      <div id="error"></div>

      <form id="form">
        <div class="section-label">Cuenta de origen (salida)</div>

        <label for="source_account">Cuenta origen</label>
        <select id="source_account" required>
          <option value="">Selecciona una cuenta...</option>
        </select>

        <div class="row">
          <div>
            <label for="amount_out">Monto enviado</label>
            <input id="amount_out" type="number" step="0.000001" min="0.000001" placeholder="0.00" required />
          </div>
          <div>
            <label for="currency_out">Divisa salida</label>
            <select id="currency_out"></select>
          </div>
        </div>

        <div class="arrow-divider">↓ Tasa: 1 divisa origen = X divisa destino ↓</div>

        <label for="exchange_rate">Tasa de cambio</label>
        <input id="exchange_rate" type="number" step="0.000001" min="0.000001" placeholder="Ej. 36" required />

        <div class="section-label">Cuenta de destino (entrada)</div>

        <label for="dest_account">Cuenta destino</label>
        <select id="dest_account" required>
          <option value="">Selecciona una cuenta...</option>
        </select>

        <div class="row">
          <div>
            <label for="amount_in">Monto recibido</label>
            <input id="amount_in" type="number" step="0.000001" min="0.000001" placeholder="0.00" required />
          </div>
          <div>
            <label for="currency_in">Divisa entrada</label>
            <select id="currency_in"></select>
          </div>
        </div>

        <label for="date">Fecha</label>
        <input id="date" type="date" required />

        <label for="notes">Notas (opcional)</label>
        <textarea id="notes" placeholder="Descripción del cambio..."></textarea>

        <button class="btn-submit" type="submit" id="btn">Registrar cambio</button>
      </form>
    </div>
  </main>

  <script>
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    let allAccounts = [];

    async function loadAccounts() {
      const res = await fetch('/api/finance/accounts');
      if (res.status === 401) { window.location.href = '/login/'; return; }
      allAccounts = await res.json();

      if (allAccounts.length < 2) {
        document.getElementById('no-accounts-note').style.display = 'block';
        document.getElementById('btn').disabled = true;
        return;
      }

      const opts = allAccounts.map(a =>
        `<option value="${a.account_id}" data-currencies='${JSON.stringify(a.supported_currencies)}'>${a.name} (${a.type})</option>`
      ).join('');

      document.getElementById('source_account').innerHTML = '<option value="">Selecciona una cuenta...</option>' + opts;
      document.getElementById('dest_account').innerHTML = '<option value="">Selecciona una cuenta...</option>' + opts;

      updateCurrencies('source_account', 'currency_out');
      updateCurrencies('dest_account', 'currency_in');
    }

    function updateCurrencies(selectId, currId) {
      const sel = document.getElementById(selectId);
      const opt = sel.options[sel.selectedIndex];
      const currSel = document.getElementById(currId);
      if (!opt || !opt.dataset.currencies) { currSel.innerHTML = ''; return; }
      const currencies = JSON.parse(opt.dataset.currencies);
      currSel.innerHTML = currencies.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    document.getElementById('source_account').addEventListener('change', () => {
      updateCurrencies('source_account', 'currency_out');
      recalculate();
    });
    document.getElementById('dest_account').addEventListener('change', () => updateCurrencies('dest_account', 'currency_in'));

    ['amount_out', 'exchange_rate'].forEach(id => {
      document.getElementById(id).addEventListener('input', recalculate);
    });

    function recalculate() {
      const out = parseFloat(document.getElementById('amount_out').value);
      const rate = parseFloat(document.getElementById('exchange_rate').value);
      if (out > 0 && rate > 0) {
        document.getElementById('amount_in').value = (out * rate).toFixed(6).replace(/\.?0+$/, '');
      }
    }

    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const errEl = document.getElementById('error');
      errEl.style.display = 'none';

      const srcId = document.getElementById('source_account').value;
      const dstId = document.getElementById('dest_account').value;

      if (srcId === dstId) {
        errEl.textContent = 'La cuenta de origen y destino no pueden ser la misma.';
        errEl.style.display = 'block'; return;
      }

      btn.disabled = true; btn.textContent = 'Registrando...';

      const payload = {
        source_account_id: srcId,
        dest_account_id: dstId,
        amount_out: parseFloat(document.getElementById('amount_out').value),
        currency_out: document.getElementById('currency_out').value,
        amount_in: parseFloat(document.getElementById('amount_in').value),
        currency_in: document.getElementById('currency_in').value,
        exchange_rate: parseFloat(document.getElementById('exchange_rate').value),
        date: document.getElementById('date').value,
        notes: document.getElementById('notes').value.trim() || null,
      };

      try {
        const res = await fetch('/api/finance/transactions/exchange', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/finance/accounts/?exchange=1';
        } else {
          errEl.textContent = data.detail || 'Error al registrar el cambio.';
          errEl.style.display = 'block';
          btn.disabled = false; btn.textContent = 'Registrar cambio';
        }
      } catch {
        errEl.textContent = 'Error de conexión.';
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Registrar cambio';
      }
    });

    document.getElementById('btn-logout').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/';
    });

    function getCookie(name) {
      return document.cookie.split('; ').find(r => r.startsWith(name + '='))?.split('=')[1] || '';
    }

    loadAccounts();
  </script>
</body>
</html>
