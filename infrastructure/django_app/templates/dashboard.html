<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Life Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #e0e0f0;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px; min-height: 100vh; flex-shrink: 0;
      background: rgba(15,12,41,0.7); backdrop-filter: blur(12px);
      border-right: 1px solid rgba(255,255,255,0.07);
      display: flex; flex-direction: column;
      padding: 1.5rem 0;
      position: sticky; top: 0; height: 100vh;
    }
    .sidebar-logo {
      font-weight: 700; font-size: 0.95rem; color: #7c6ff7;
      padding: 0 1.5rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.07);
      letter-spacing: 0.02em;
    }
    .sidebar-nav { flex: 1; padding: 1rem 0; }
    .nav-item {
      display: flex; align-items: center; gap: 0.65rem;
      padding: 0.7rem 1.5rem; color: #9090b0; font-size: 0.9rem;
      font-weight: 500; text-decoration: none; transition: color 0.15s, background 0.15s;
      border-left: 2px solid transparent;
    }
    .nav-item:hover { color: #e0e0f0; background: rgba(255,255,255,0.04); }
    .nav-item.active {
      color: #c0b8ff; border-left-color: #7c6ff7;
      background: rgba(124,111,247,0.08);
    }
    .nav-icon { font-size: 1rem; width: 1.25rem; text-align: center; }
    .sidebar-footer { padding: 1rem 1.5rem; }
    .btn-logout {
      width: 100%; background: transparent;
      border: 1px solid rgba(255,255,255,0.12); color: #9090b0;
      font-size: 0.82rem; font-weight: 600; padding: 0.5rem;
      border-radius: 0.5rem; cursor: pointer; transition: color 0.2s, border-color 0.2s;
    }
    .btn-logout:hover { color: #f87171; border-color: #f8717155; }

    /* ── Main ── */
    .main { flex: 1; padding: 2.5rem 2rem; overflow-y: auto; }
    .page-title {
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: #7c6ff7; margin-bottom: 0.5rem;
    }
    .greeting-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 1.25rem; padding: 2rem;
      backdrop-filter: blur(12px); margin-bottom: 2rem;
    }
    .greeting-card h1 {
      font-size: 1.75rem; font-weight: 700; color: #fff;
      margin-bottom: 0.4rem; min-height: 2.2rem;
    }
    .greeting-card p { color: #8080a0; font-size: 0.9rem; }

    /* ── Section header ── */
    .section-header {
      display: flex; align-items: baseline; gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .section-label {
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: #7c6ff7;
    }
    .section-month {
      font-size: 0.82rem; font-weight: 500; color: #6060a0;
    }

    /* ── Metric cards ── */
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .metric-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1rem; padding: 1.5rem;
    }
    .metric-card .metric-label {
      font-size: 0.78rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: #7070a0; margin-bottom: 0.6rem;
    }
    .metric-card .metric-value {
      font-size: 1.65rem; font-weight: 700; color: #fff; min-height: 2rem;
    }
    .metric-card.income  { border-color: rgba(52, 211, 153, 0.2); }
    .metric-card.expense { border-color: rgba(248, 113, 113, 0.2); }
    .metric-card.savings { border-color: rgba(124, 111, 247, 0.25); }
    .metric-card.income  .metric-value { color: #34d399; }
    .metric-card.expense .metric-value { color: #f87171; }
    .metric-card.savings .metric-value { color: #a78bfa; }

    /* ── Skeleton ── */
    .skeleton {
      display: inline-block;
      background: linear-gradient(90deg,rgba(255,255,255,0.06) 25%,rgba(255,255,255,0.12) 50%,rgba(255,255,255,0.06) 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite;
      border-radius: 0.4rem;
    }
    .skeleton-text { height: 1em; width: 240px; }
    .skeleton-value { height: 1.65rem; width: 120px; }
    @keyframes shimmer { to { background-position: -200% 0; } }
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-logo">Life Admin</div>
    <div class="sidebar-nav">
      <a href="/dashboard/" class="nav-item active">
        <span class="nav-icon">🏠</span> Dashboard
      </a>
      <a href="/finance/accounts/" class="nav-item">
        <span class="nav-icon">💳</span> Mis cuentas
      </a>
      <a href="/profile/" class="nav-item">
        <span class="nav-icon">👤</span> Mi perfil
      </a>
    </div>
    <div class="sidebar-footer">
      <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
    </div>
  </nav>

  <main class="main">
    <div class="page-title">Panel de control</div>
    <div class="greeting-card">
      <h1 id="greeting"><span class="skeleton skeleton-text"></span></h1>
      <p>Los agentes IA están listos para ayudarte a gestionar tu vida personal.</p>
    </div>

    <div class="section-header">
      <span class="section-label">Finanzas</span>
      <span class="section-month" id="month-label"></span>
    </div>
    <div class="metrics">
      <div class="metric-card income">
        <div class="metric-label">Ingresos totales</div>
        <div class="metric-value" id="val-income">
          <span class="skeleton skeleton-value"></span>
        </div>
      </div>
      <div class="metric-card expense">
        <div class="metric-label">Egresos totales</div>
        <div class="metric-value" id="val-expenses">
          <span class="skeleton skeleton-value"></span>
        </div>
      </div>
      <div class="metric-card savings">
        <div class="metric-label">Ahorros</div>
        <div class="metric-value" id="val-savings">
          <span class="skeleton skeleton-value"></span>
        </div>
      </div>
    </div>
  </main>

  <script>
    const MONTHS_ES = [
      'enero','febrero','marzo','abril','mayo','junio',
      'julio','agosto','septiembre','octubre','noviembre','diciembre'
    ];

    function fmt(amount) {
      return new Intl.NumberFormat('es-MX', {
        style: 'currency', currency: 'MXN', maximumFractionDigits: 2
      }).format(amount);
    }

    async function loadProfile() {
      try {
        const res  = await fetch('/api/auth/me');
        const data = await res.json();
        if (res.ok) {
          const first = data.full_name.split(' ')[0];
          document.getElementById('greeting').textContent = `¡Hola, ${first}! Bienvenido a tu panel.`;
          document.title = `${first} — Life Admin`;
        } else {
          window.location.href = '/login/';
        }
      } catch { window.location.href = '/login/'; }
    }

    async function loadSummary() {
      const now = new Date();
      document.getElementById('month-label').textContent =
        MONTHS_ES[now.getMonth()] + ' ' + now.getFullYear();

      try {
        const res  = await fetch('/api/finance/summary/current');
        const data = await res.json();
        if (res.ok) {
          document.getElementById('val-income').textContent   = fmt(data.total_income);
          document.getElementById('val-expenses').textContent = fmt(data.total_expenses);
          document.getElementById('val-savings').textContent  = fmt(data.savings);
        } else {
          ['val-income','val-expenses','val-savings'].forEach(id => {
            document.getElementById(id).textContent = '—';
          });
        }
      } catch {
        ['val-income','val-expenses','val-savings'].forEach(id => {
          document.getElementById(id).textContent = '—';
        });
      }
    }

    document.getElementById('btn-logout').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/';
    });

    loadProfile();
    loadSummary();
  </script>
</body>
</html>
