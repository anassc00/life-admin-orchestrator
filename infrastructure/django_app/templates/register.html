<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta — Life Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1.25rem;
      padding: 2.5rem;
      backdrop-filter: blur(12px);
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: #9090b0;
      font-size: 0.88rem;
      text-decoration: none;
      margin-bottom: 1.75rem;
      transition: color 0.2s;
    }
    .back:hover { color: #e0e0f0; }

    h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      color: #7070a0;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .form-group { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #9090b0;
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 0.6rem;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input::placeholder { color: #505070; }
    input:focus { border-color: #7c6ff7; }

    .btn-submit {
      width: 100%;
      padding: 0.75rem;
      margin-top: 0.5rem;
      border: none;
      border-radius: 0.6rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #7c6ff7, #5b58e0);
      color: #fff;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-submit:hover  { opacity: 0.9; }
    .btn-submit:active { transform: scale(0.98); }

    .message {
      margin-top: 1rem;
      padding: 0.7rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.88rem;
      display: none;
    }
    .message.success { background: rgba(29,185,123,0.15); color: #1db97b; border: 1px solid #1db97b55; }
    .message.error   { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid #f8717155; }
    .message.show    { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <a href="/" class="back">← Volver</a>
    <h2>Crear mi administrador</h2>
    <p class="subtitle">Completa los datos para configurar tu cuenta.</p>

    <form id="register-form" novalidate>
      <div class="row">
        <div class="form-group">
          <label for="first-name">Nombre</label>
          <input id="first-name" type="text" placeholder="Ana" required />
        </div>
        <div class="form-group">
          <label for="last-name">Apellido</label>
          <input id="last-name" type="text" placeholder="Santos" required />
        </div>
      </div>
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" placeholder="ana@ejemplo.com" required />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="Mínimo 8 caracteres" required />
      </div>
      <button type="submit" class="btn-submit">Crear cuenta</button>
      <div id="msg" class="message"></div>
    </form>
  </div>

  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Creando cuenta...';

      const body = {
        first_name: document.getElementById('first-name').value.trim(),
        last_name:  document.getElementById('last-name').value.trim(),
        email:      document.getElementById('email').value.trim(),
        password:   document.getElementById('password').value,
      };

      try {
        const res  = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();

        if (res.status === 201) {
          showMsg('¡Cuenta creada! Redirigiendo...', 'success');
          setTimeout(() => { window.location.href = '/dashboard/'; }, 800);
        } else {
          showMsg(data.detail || 'Error al crear la cuenta.', 'error');
          btn.disabled = false;
          btn.textContent = 'Crear cuenta';
        }
      } catch {
        showMsg('Error de red. Intenta de nuevo.', 'error');
        btn.disabled = false;
        btn.textContent = 'Crear cuenta';
      }
    });

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = `message ${type} show`;
    }
  </script>
</body>
</html>
