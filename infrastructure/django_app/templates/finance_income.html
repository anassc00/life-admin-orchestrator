<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrar ingreso — Life Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #e0e0f0; display: flex;
    }
    .sidebar { width: 220px; min-height: 100vh; flex-shrink: 0; background: rgba(15,12,41,0.7); backdrop-filter: blur(12px); border-right: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; padding: 1.5rem 0; position: sticky; top: 0; height: 100vh; }
    .sidebar-logo { font-weight: 700; font-size: 0.95rem; color: #7c6ff7; padding: 0 1.5rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .sidebar-nav { flex: 1; padding: 1rem 0; }
    .nav-item { display: flex; align-items: center; gap: 0.65rem; padding: 0.7rem 1.5rem; color: #9090b0; font-size: 0.9rem; font-weight: 500; text-decoration: none; transition: color 0.15s, background 0.15s; border-left: 2px solid transparent; }
    .nav-item:hover { color: #e0e0f0; background: rgba(255,255,255,0.04); }
    .nav-item.active { color: #c0b8ff; border-left-color: #7c6ff7; background: rgba(124,111,247,0.08); }
    .nav-icon { font-size: 1rem; width: 1.25rem; text-align: center; }
    .sidebar-footer { padding: 1rem 1.5rem; }
    .btn-logout { width: 100%; background: transparent; border: 1px solid rgba(255,255,255,0.12); color: #9090b0; font-size: 0.82rem; font-weight: 600; padding: 0.5rem; border-radius: 0.5rem; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
    .btn-logout:hover { color: #f87171; border-color: #f8717155; }

    .main { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 3rem 2rem; }
    .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.25rem; padding: 2.25rem; width: 100%; max-width: 420px; backdrop-filter: blur(12px); }
    .page-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #7c6ff7; margin-bottom: 0.3rem; }
    h2 { font-size: 1.3rem; font-weight: 700; color: #fff; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.78rem; font-weight: 600; color: #9090b0; margin-bottom: 0.35rem; }
    input, select, textarea { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: #e0e0f0; border-radius: 0.55rem; padding: 0.6rem 0.85rem; font-size: 0.92rem; margin-bottom: 1rem; outline: none; transition: border-color 0.2s; font-family: inherit; }
    input:focus, select:focus, textarea:focus { border-color: #7c6ff7; }
    select option { background: #1e1b4b; }
    textarea { resize: vertical; min-height: 75px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem; }
    .btn-submit { width: 100%; background: #7c6ff7; border: none; color: #fff; font-size: 0.95rem; font-weight: 700; padding: 0.7rem; border-radius: 0.7rem; cursor: pointer; transition: background 0.2s; margin-top: 0.25rem; }
    .btn-submit:hover { background: #6a5fe5; }
    .btn-submit:disabled { background: rgba(124,111,247,0.4); cursor: not-allowed; }
    .checkbox-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1rem; cursor: pointer; }
    .checkbox-row input[type="checkbox"] { width: auto; margin: 0; accent-color: #7c6ff7; cursor: pointer; }
    .checkbox-row span { font-size: 0.88rem; color: #c0b8ff; user-select: none; }
    #error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: #f87171; padding: 0.65rem 0.9rem; border-radius: 0.55rem; font-size: 0.83rem; margin-bottom: 1rem; display: none; }
    .no-accounts-note { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.25); color: #fbbf24; padding: 0.65rem 0.9rem; border-radius: 0.55rem; font-size: 0.83rem; margin-bottom: 1rem; display: none; }
    .no-accounts-note a { color: #fbbf24; }
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-logo">Life Admin</div>
    <div class="sidebar-nav">
      <a href="/dashboard/" class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a>
      <a href="/finance/accounts/" class="nav-item active"><span class="nav-icon">💳</span> Mis cuentas</a>
      <a href="/profile/" class="nav-item"><span class="nav-icon">👤</span> Mi perfil</a>
    </div>
    <div class="sidebar-footer">
      <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
    </div>
  </nav>

  <main class="main">
    <div class="card">
      <div class="page-title">Finanzas</div>
      <h2>Registrar ingreso</h2>

      <div id="no-accounts-note" class="no-accounts-note">
        No tienes cuentas. <a href="/finance/accounts/">Crea una primero →</a>
      </div>
      <div id="error"></div>

      <form id="form">
        <label for="account">Cuenta destino</label>
        <select id="account" required>
          <option value="">Selecciona una cuenta...</option>
        </select>

        <div class="row">
          <div>
            <label for="amount">Monto</label>
            <input id="amount" type="number" step="0.01" min="0.01" placeholder="0.00" required />
          </div>
          <div>
            <label for="currency">Divisa</label>
            <select id="currency">
              <option value="USD">USD</option>
              <option value="USDT">USDT</option>
              <option value="VES">VES</option>
            </select>
          </div>
        </div>

        <label for="exchange_rate">Tasa de cambio</label>
        <input id="exchange_rate" type="number" step="0.000001" min="0.000001" value="1.0" required />

        <label for="category">Categoría</label>
        <select id="category">
          <option value="salary">Salario</option>
          <option value="professional_fees">Honorarios profesionales</option>
          <option value="other_payments">Otros pagos</option>
        </select>

        <label for="date">Fecha</label>
        <input id="date" type="date" required />

        <label for="notes">Notas (opcional)</label>
        <textarea id="notes" placeholder="Descripción adicional..."></textarea>

        <label class="checkbox-row">
          <input type="checkbox" id="is_base_salary" />
          <span>Aplica a planificación mensual</span>
        </label>

        <button class="btn-submit" type="submit" id="btn">Registrar ingreso</button>
      </form>
    </div>
  </main>

  <script>
    document.getElementById('date').value = new Date().toISOString().split('T')[0];

    async function loadAccounts() {
      const res = await fetch('/api/finance/accounts');
      if (res.status === 401) { window.location.href = '/login/'; return; }
      const data = await res.json();
      const sel = document.getElementById('account');
      if (!data.length) {
        document.getElementById('no-accounts-note').style.display = 'block';
        document.getElementById('btn').disabled = true;
        return;
      }
      data.forEach(a => {
        const opt = document.createElement('option');
        opt.value = a.account_id;
        opt.textContent = `${a.name} (${a.type})`;
        opt.dataset.currencies = JSON.stringify(a.supported_currencies);
        sel.appendChild(opt);
      });
      updateCurrencies();
    }

    function updateCurrencies() {
      const sel = document.getElementById('account');
      const opt = sel.options[sel.selectedIndex];
      if (!opt || !opt.dataset.currencies) return;
      const currencies = JSON.parse(opt.dataset.currencies);
      const currSel = document.getElementById('currency');
      const prev = currSel.value;
      currSel.innerHTML = '';
      currencies.forEach(c => {
        const o = document.createElement('option');
        o.value = c; o.textContent = c;
        if (c === prev) o.selected = true;
        currSel.appendChild(o);
      });
    }

    document.getElementById('account').addEventListener('change', updateCurrencies);

    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const errEl = document.getElementById('error');
      errEl.style.display = 'none';
      btn.disabled = true; btn.textContent = 'Registrando...';

      const payload = {
        account_id: document.getElementById('account').value,
        amount: parseFloat(document.getElementById('amount').value),
        currency: document.getElementById('currency').value,
        exchange_rate: parseFloat(document.getElementById('exchange_rate').value),
        category: document.getElementById('category').value,
        is_base_salary: document.getElementById('is_base_salary').checked,
        date: document.getElementById('date').value,
        notes: document.getElementById('notes').value.trim() || null,
      };

      try {
        const res = await fetch('/api/finance/transactions/income', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/finance/accounts/?income=1';
        } else {
          errEl.textContent = data.detail || 'Error al registrar ingreso.';
          errEl.style.display = 'block';
          btn.disabled = false; btn.textContent = 'Registrar ingreso';
        }
      } catch {
        errEl.textContent = 'Error de conexión.';
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Registrar ingreso';
      }
    });

    document.getElementById('btn-logout').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/';
    });

    function getCookie(name) {
      return document.cookie.split('; ').find(r => r.startsWith(name + '='))?.split('=')[1] || '';
    }

    loadAccounts();
  </script>
</body>
</html>
