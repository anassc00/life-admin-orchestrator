<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Life Admin{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #e0e0f0; display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px; min-height: 100vh; flex-shrink: 0;
      background: rgba(15,12,41,0.7); backdrop-filter: blur(12px);
      border-right: 1px solid rgba(255,255,255,0.07);
      display: flex; flex-direction: column;
      padding: 1.5rem 0;
      position: sticky; top: 0; height: 100vh;
    }
    .sidebar-logo {
      font-weight: 700; font-size: 0.95rem; color: #7c6ff7;
      padding: 0 1.5rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.07);
      letter-spacing: 0.02em;
    }
    .sidebar-nav { flex: 1; padding: 1rem 0; }
    .nav-item {
      display: flex; align-items: center; gap: 0.65rem;
      padding: 0.7rem 1.5rem; color: #9090b0; font-size: 0.9rem;
      font-weight: 500; text-decoration: none; transition: color 0.15s, background 0.15s;
      border-left: 2px solid transparent;
    }
    .nav-item:hover { color: #e0e0f0; background: rgba(255,255,255,0.04); }
    .nav-item.active {
      color: #c0b8ff; border-left-color: #7c6ff7;
      background: rgba(124,111,247,0.08);
    }
    .nav-icon { font-size: 1rem; width: 1.25rem; text-align: center; }
    .sidebar-footer { padding: 1rem 1.5rem; }
    .btn-logout {
      width: 100%; background: transparent;
      border: 1px solid rgba(255,255,255,0.12); color: #9090b0;
      font-size: 0.82rem; font-weight: 600; padding: 0.5rem;
      border-radius: 0.5rem; cursor: pointer; transition: color 0.2s, border-color 0.2s;
    }
    .btn-logout:hover { color: #f87171; border-color: #f8717155; }

    /* ── Main content area ── */
    .main { flex: 1; padding: 2.5rem 2rem; overflow-y: auto; }
    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-logo">Life Admin</div>
    <div class="sidebar-nav">
      <a href="/dashboard/" class="nav-item" data-route="dashboard">
        <span class="nav-icon">🏠</span> Dashboard
      </a>
      <a href="/finance/accounts/" class="nav-item" data-route="accounts">
        <span class="nav-icon">💳</span> Mis cuentas
      </a>
      <a href="/finance/income/" class="nav-item" data-route="income">
        <span class="nav-icon">💰</span> Ingresos
      </a>
      <a href="/finance/expenses/" class="nav-item" data-route="expenses">
        <span class="nav-icon">💸</span> Egresos
      </a>
      <a href="/finance/savings/" class="nav-item" data-route="savings">
        <span class="nav-icon">🏦</span> Ahorros
      </a>
      <a href="/finance/planning/" class="nav-item" data-route="planning">
        <span class="nav-icon">📊</span> Planificación
      </a>
      <a href="/finance/transactions/" class="nav-item" data-route="transactions">
        <span class="nav-icon">📋</span> Transacciones
      </a>
      <a href="/finance/invoices/" class="nav-item" data-route="invoices">
        <span class="nav-icon">🧾</span> Facturas
      </a>
      <a href="/finance/reports/" class="nav-item" data-route="reports">
        <span class="nav-icon">📈</span> Reportes
      </a>
      <a href="/finance/cashflow/" class="nav-item" data-route="cashflow">
        <span class="nav-icon">📅</span> Cashflow
      </a>
      <a href="/profile/" class="nav-item" data-route="profile">
        <span class="nav-icon">👤</span> Mi perfil
      </a>
    </div>
    <div class="sidebar-footer">
      <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
    </div>
  </nav>

  <main class="main">
    {% block content %}{% endblock %}
  </main>

  <script>
    // ── Set active nav item based on current path ──
    (function() {
      const path = window.location.pathname;
      const navItems = document.querySelectorAll('.nav-item[data-route]');

      // Remove all active classes
      navItems.forEach(item => item.classList.remove('active'));

      // Map routes to data-route values
      const routeMap = [
        { path: '/dashboard/', route: 'dashboard' },
        { path: '/finance/accounts/', route: 'accounts' },
        { path: '/finance/income/', route: 'income' },
        { path: '/finance/expenses/', route: 'expenses' },
        { path: '/finance/savings/', route: 'savings' },
        { path: '/finance/planning/', route: 'planning' },
        { path: '/finance/transactions/', route: 'transactions' },
        { path: '/finance/invoices/', route: 'invoices' },
        { path: '/finance/reports/', route: 'reports' },
        { path: '/finance/cashflow/', route: 'cashflow' },
        { path: '/profile/', route: 'profile' },
      ];

      // Find matching route (use most specific match)
      let matchedRoute = null;
      for (const r of routeMap) {
        if (path.startsWith(r.path)) {
          if (!matchedRoute || r.path.length > matchedRoute.path.length) {
            matchedRoute = r;
          }
        }
      }

      if (matchedRoute) {
        const activeItem = document.querySelector(`.nav-item[data-route="${matchedRoute.route}"]`);
        if (activeItem) activeItem.classList.add('active');
      }
    })();

    // ── Logout handler (global) ──
    document.getElementById('btn-logout').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/';
    });
  </script>
  {% block extra_script %}{% endblock %}
</body>
</html>
