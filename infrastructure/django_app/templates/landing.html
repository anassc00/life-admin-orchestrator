<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Admin — Orchestrator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .hero {
      text-align: center;
      max-width: 520px;
      width: 100%;
    }

    .badge {
      display: inline-block;
      background: rgba(124, 111, 247, 0.2);
      border: 1px solid rgba(124, 111, 247, 0.4);
      color: #a89cf7;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.15;
      letter-spacing: -0.5px;
      margin-bottom: 1rem;
    }

    h1 span { color: #7c6ff7; }

    p {
      color: #9090b0;
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.8rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 0.7rem;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
      display: inline-block;
    }

    .btn:active { transform: scale(0.97); }
    .btn:hover  { opacity: 0.9; }

    .btn-primary {
      background: linear-gradient(135deg, #7c6ff7, #5b58e0);
      color: #fff;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #e0e0f0;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="badge">Personal ERP · AI Agents</div>
    <h1>Life Admin<br><span>Orchestrator</span></h1>
    <p>Gestiona tus finanzas, agenda, documentos y contactos<br>con la potencia de agentes de inteligencia artificial.</p>
    <div class="actions">
      <a href="/register/" class="btn btn-primary">Crear cuenta</a>
      <a href="/login/"    class="btn btn-secondary">Iniciar sesión</a>
    </div>
  </div>
</body>
</html>
