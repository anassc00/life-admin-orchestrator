<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nueva cuenta — Life Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #e0e0f0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 1.25rem; padding: 2.5rem;
      width: 100%; max-width: 440px;
      backdrop-filter: blur(12px);
    }
    .card h1 { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 0.25rem; }
    .card .sub { font-size: 0.85rem; color: #8080a0; margin-bottom: 2rem; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: #9090b0; margin-bottom: 0.4rem; }
    input, select {
      width: 100%; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12); color: #e0e0f0;
      border-radius: 0.6rem; padding: 0.65rem 0.9rem; font-size: 0.95rem;
      margin-bottom: 1.2rem; outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: #7c6ff7; }
    select option { background: #1e1b4b; }
    .checkboxes { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.2rem; }
    .checkboxes label {
      display: flex; align-items: center; gap: 0.35rem;
      font-size: 0.85rem; font-weight: 500; color: #c0c0e0; margin: 0; cursor: pointer;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      padding: 0.4rem 0.8rem; border-radius: 0.5rem;
      transition: background 0.15s, border-color 0.15s;
    }
    .checkboxes input[type="checkbox"] { width: auto; margin: 0; accent-color: #7c6ff7; }
    .checkboxes label:has(input:checked) {
      background: rgba(124,111,247,0.18); border-color: rgba(124,111,247,0.5);
    }
    .btn-submit {
      width: 100%; background: #7c6ff7; border: none; color: #fff;
      font-size: 1rem; font-weight: 700; padding: 0.75rem; border-radius: 0.75rem;
      cursor: pointer; transition: background 0.2s; margin-top: 0.5rem;
    }
    .btn-submit:hover { background: #6a5fe5; }
    .btn-submit:disabled { background: rgba(124,111,247,0.4); cursor: not-allowed; }
    #error {
      background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3);
      color: #f87171; padding: 0.75rem 1rem; border-radius: 0.6rem;
      font-size: 0.85rem; margin-bottom: 1rem; display: none;
    }
    .link { color: #7c6ff7; font-size: 0.85rem; text-align: center; margin-top: 1.25rem; }
    .link a { color: #7c6ff7; text-decoration: none; }
    .link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Nueva cuenta</h1>
    <p class="sub">Registra una billetera, cuenta bancaria o efectivo.</p>

    <div id="error"></div>

    <form id="form">
      <label for="name">Nombre de la cuenta</label>
      <input id="name" type="text" placeholder="Ej. Mi Billetera USDT" required />

      <label for="type">Tipo de cuenta</label>
      <select id="type">
        <option value="wallet">Billetera digital</option>
        <option value="bank">Cuenta bancaria</option>
        <option value="cash">Efectivo</option>
      </select>

      <label>Divisas soportadas</label>
      <div class="checkboxes" id="supported-currencies">
        <label><input type="checkbox" value="USD" checked /> USD</label>
        <label><input type="checkbox" value="USDT" /> USDT</label>
        <label><input type="checkbox" value="VES" /> VES</label>
      </div>

      <label>Divisa por defecto</label>
      <div class="checkboxes" id="default-currencies">
        <label><input type="checkbox" value="USD" checked /> USD</label>
        <label><input type="checkbox" value="USDT" /> USDT</label>
        <label><input type="checkbox" value="VES" /> VES</label>
      </div>

      <button class="btn-submit" type="submit" id="btn">Crear cuenta</button>
    </form>

    <div class="link"><a href="/finance/">← Volver a Finanzas</a></div>
  </div>

  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const errEl = document.getElementById('error');
      errEl.style.display = 'none';
      btn.disabled = true; btn.textContent = 'Creando...';

      const supported = [...document.querySelectorAll('#supported-currencies input:checked')].map(i => i.value);
      const defaults = [...document.querySelectorAll('#default-currencies input:checked')].map(i => i.value);

      if (!supported.length || !defaults.length) {
        errEl.textContent = 'Debes seleccionar al menos una divisa soportada y una por defecto.';
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Crear cuenta';
        return;
      }

      const payload = {
        name: document.getElementById('name').value.trim(),
        type: document.getElementById('type').value,
        supported_currencies: supported,
        default_currencies: defaults,
      };

      try {
        const res = await fetch('/api/finance/accounts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/finance/?created=1';
        } else {
          errEl.textContent = data.detail || 'Error al crear la cuenta.';
          errEl.style.display = 'block';
          btn.disabled = false; btn.textContent = 'Crear cuenta';
        }
      } catch {
        errEl.textContent = 'Error de conexión.';
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Crear cuenta';
      }
    });

    function getCookie(name) {
      return document.cookie.split('; ').find(r => r.startsWith(name + '='))?.split('=')[1] || '';
    }
  </script>
</body>
</html>
